<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaMart Global — Sign In / Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
    <style>
        .auth-container {
            max-width: 460px;
            margin: 60px auto;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px 36px;
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }
        .auth-container h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .auth-container .subtitle {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 0.95rem;
        }
        .auth-tabs {
            display: flex;
            gap: 0;
            background: var(--bg);
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .auth-tabs button {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
        }
        .auth-tabs button.active {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            color: var(--text-primary);
        }
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .auth-form.active {
            display: flex;
        }
        .auth-form .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .auth-form label {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-form input {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--bg);
        }
        .auth-form input:focus {
            border-color: var(--primary);
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255,107,0,0.08);
        }
        .auth-form .btn {
            margin-top: 8px;
            padding: 14px;
            font-size: 1rem;
        }
        .auth-message {
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 500;
            display: none;
        }
        .auth-message.error {
            display: block;
            background: #FEE2E2;
            color: var(--danger);
        }
        .auth-message.success {
            display: block;
            background: #DCFCE7;
            color: var(--success);
        }
        .auth-container .back-link {
            display: inline-block;
            margin-top: 16px;
            color: var(--primary);
            font-weight: 500;
            transition: var(--transition);
        }
        .auth-container .back-link:hover {
            color: var(--primary-dark);
        }
    </style>
</head>
<body>
    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="container top-bar__inner">
            <span class="top-bar__tagline"><i class="fas fa-truck-fast"></i> Free shipping on orders over $50</span>
            <div class="top-bar__links">
                <a href="#"><i class="fas fa-box"></i> Orders</a>
                <a href="#"><i class="fas fa-circle-question"></i> Help</a>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="container header__inner">
            <a href="index-firebase.html" class="logo">
                <span class="logo__icon">🛒</span>
                <span class="logo__text">Nova<span class="logo__highlight">Mart</span></span>
                <span class="logo__badge">Global</span>
            </a>
        </div>
    </header>

    <!-- AUTH CONTAINER -->
    <div class="container">
        <div class="auth-container">
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to your account or create a new one.</p>

            <!-- Tabs -->
            <div class="auth-tabs" id="authTabs">
                <button class="active" data-tab="login">Sign In</button>
                <button data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required />
                </div>
                <div class="auth-message" id="loginMessage"></div>
                <button type="submit" class="btn btn--primary">Sign In</button>
                <button type="button" class="btn btn--outline" id="switchToRegister">Create New Account</button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6" />
                </div>
                <div class="form-group">
                    <label for="regConfirm">Confirm Password</label>
                    <input type="password" id="regConfirm" placeholder="••••••••" required />
                </div>
                <div class="auth-message" id="registerMessage"></div>
                <button type="submit" class="btn btn--primary">Create Account</button>
                <button type="button" class="btn btn--outline" id="switchToLogin">Already have an account? Sign In</button>
            </form>

            <a href="index-firebase.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to shopping</a>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-auth.js"></script>
    <script src="login-firebase.js"></script>
</body>
</html>

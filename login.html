<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaMart Global — Sign In / Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
    <style>
        /* Additional styles specific to login page */
        .auth-container {
            max-width: 460px;
            margin: 60px auto;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px 36px;
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }
        .auth-container h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .auth-container .subtitle {
            color: var(--text-secondary);
            margin-bottom: 28px;
            font-size: 0.95rem;
        }
        .auth-tabs {
            display: flex;
            gap: 0;
            background: var(--bg);
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .auth-tabs button {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-secondary);
        }
        .auth-tabs button.active {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            color: var(--text-primary);
        }
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 16px;
        }
        .auth-form.active {
            display: flex;
        }
        .auth-form .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .auth-form label {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-form input {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--bg);
        }
        .auth-form input:focus {
            border-color: var(--primary);
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255,107,0,0.08);
        }
        .auth-form .btn {
            margin-top: 8px;
            padding: 14px;
            font-size: 1rem;
        }
        .auth-message {
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 500;
            display: none;
        }
        .auth-message.error {
            display: block;
            background: #FEE2E2;
            color: var(--danger);
        }
        .auth-message.success {
            display: block;
            background: #DCFCE7;
            color: var(--success);
        }
        .auth-divider {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin: 4px 0;
        }
        .auth-container .back-link {
            display: inline-block;
            margin-top: 16px;
            color: var(--primary);
            font-weight: 500;
            transition: var(--transition);
        }
        .auth-container .back-link:hover {
            color: var(--primary-dark);
        }
        @media (max-width: 480px) {
            .auth-container {
                margin: 30px 16px;
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== TOP BAR ===== -->
    <div class="top-bar">
        <div class="container top-bar__inner">
            <span class="top-bar__tagline"><i class="fas fa-truck-fast"></i> Free shipping on orders over $50</span>
            <div class="top-bar__links">
                <a href="login.html"><i class="fas fa-user"></i> Account</a>
                <a href="#"><i class="fas fa-box"></i> Orders</a>
                <a href="#"><i class="fas fa-circle-question"></i> Help</a>
            </div>
        </div>
    </div>

    <!-- ===== HEADER ===== -->
    <header class="header" id="mainHeader">
        <div class="container header__inner">
            <a href="index.html" class="logo">
                <span class="logo__icon">🛒</span>
                <span class="logo__text">Nova<span class="logo__highlight">Mart</span></span>
                <span class="logo__badge">Global</span>
            </a>
            <div class="header-actions">
                <a href="wishlist.html" class="header-action" id="headerWishlist">
                    <i class="fas fa-heart"></i>
                    <span class="header-action__badge" id="wishlistCount">0</span>
                </a>
                <a href="cart.html" class="header-action" id="headerCart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="header-action__badge" id="cartCount">0</span>
                </a>
                <a href="login.html" class="header-action header-action--user">
                    <i class="fas fa-user-circle"></i>
                    <span class="header-action__label" id="userNameLabel">Sign In</span>
                </a>
            </div>
        </div>
    </header>

    <!-- ===== AUTH CONTAINER ===== -->
    <div class="container">
        <div class="auth-container">
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to your account or create a new one.</p>

            <!-- Tabs -->
            <div class="auth-tabs" id="authTabs">
                <button class="active" data-tab="login">Sign In</button>
                <button data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required />
                </div>
                <div class="auth-message" id="loginMessage"></div>
                <button type="submit" class="btn btn--primary">Sign In</button>
                <div class="auth-divider">— or —</div>
                <button type="button" class="btn btn--outline" id="switchToRegister">Create New Account</button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6" />
                </div>
                <div class="form-group">
                    <label for="regConfirm">Confirm Password</label>
                    <input type="password" id="regConfirm" placeholder="••••••••" required />
                </div>
                <div class="auth-message" id="registerMessage"></div>
                <button type="submit" class="btn btn--primary">Create Account</button>
                <div class="auth-divider">— or —</div>
                <button type="button" class="btn btn--outline" id="switchToLogin">Already have an account? Sign In</button>
            </form>

            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to shopping</a>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== SCRIPTS ===== -->
    <script src="products.js"></script>
    <script src="auth.js"></script>
    <script src="cart.js"></script>
    <script src="wishlist.js"></script>
    <script>
        (function() {
            'use strict';

            // DOM refs
            const tabs = document.querySelectorAll('#authTabs button');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginMessage = document.getElementById('loginMessage');
            const registerMessage = document.getElementById('registerMessage');
            const switchToRegister = document.getElementById('switchToRegister');
            const switchToLogin = document.getElementById('switchToLogin');

            // Badge updates
            function updateBadges() {
                const cartCount = document.getElementById('cartCount');
                const wishlistCount = document.getElementById('wishlistCount');
                if (cartCount) cartCount.textContent = Cart.getTotalItems();
                if (wishlistCount) wishlistCount.textContent = Wishlist.getWishlist().length;
                const user = Auth.getCurrentUser();
                const label = document.getElementById('userNameLabel');
                if (label) label.textContent = user ? user.name : 'Sign In';
            }

            // Show toast
            function showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast toast--${type}`;
                toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
                container.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
            }

            // Tab switching
            function switchTab(tabId) {
                tabs.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabId));
                loginForm.classList.toggle('active', tabId === 'login');
                registerForm.classList.toggle('active', tabId === 'register');
                loginMessage.textContent = '';
                loginMessage.className = 'auth-message';
                registerMessage.textContent = '';
                registerMessage.className = 'auth-message';
            }

            tabs.forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });
            switchToRegister.addEventListener('click', () => switchTab('register'));
            switchToLogin.addEventListener('click', () => switchTab('login'));

            // Login handler
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                const result = Auth.login(email, password);
                if (result.success) {
                    loginMessage.textContent = '✅ Login successful! Redirecting...';
                    loginMessage.className = 'auth-message success';
                    showToast('Welcome back, ' + result.user.name + '!', 'success');
                    updateBadges();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    loginMessage.textContent = '❌ ' + result.message;
                    loginMessage.className = 'auth-message error';
                }
            });

            // Register handler
            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirm').value;
                const result = Auth.signUp(name, email, password, confirm);
                if (result.success) {
                    registerMessage.textContent = '✅ Account created! Redirecting...';
                    registerMessage.className = 'auth-message success';
                    showToast('Welcome, ' + result.user.name + '!', 'success');
                    updateBadges();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    registerMessage.textContent = '❌ ' + result.message;
                    registerMessage.className = 'auth-message error';
                }
            });

            // If already logged in, redirect to home
            if (Auth.isLoggedIn()) {
                // But if they're on login page, maybe they want to logout? We'll let them stay.
                // Just update UI.
            }

            // Init badges
            updateBadges();

        })();
    </script>
</body>
</html>

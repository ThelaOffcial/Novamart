<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaMart Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        .admin-sidebar {
            background: var(--text-primary);
            color: #fff;
            padding: 20px;
            position: fixed;
            height: 100vh;
            width: 250px;
            overflow-y: auto;
        }
        .admin-sidebar h2 {
            margin-bottom: 24px;
            font-size: 1.3rem;
        }
        .admin-sidebar ul {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .admin-sidebar li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.7);
            transition: var(--transition);
            cursor: pointer;
        }
        .admin-sidebar li a:hover,
        .admin-sidebar li a.active {
            background: var(--primary);
            color: #fff;
        }
        .admin-main {
            margin-left: 250px;
            padding: 32px;
            background: var(--bg);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .admin-content {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th {
            background: var(--bg);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
        }
        .admin-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        .admin-table tr:hover {
            background: var(--bg);
        }
        .admin-actions {
            display: flex;
            gap: 8px;
        }
        .admin-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition);
        }
        .admin-actions .edit {
            color: var(--primary);
        }
        .admin-actions .delete {
            color: var(--danger);
        }
        .admin-actions button:hover {
            transform: scale(1.2);
        }
        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .modal-form .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .modal-form input,
        .modal-form textarea,
        .modal-form select {
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
        }
        .modal-form input:focus,
        .modal-form textarea:focus,
        .modal-form select:focus {
            border-color: var(--primary);
            outline: none;
        }
        .modal-form textarea {
            min-height: 100px;
            resize: vertical;
        }
        .modal-form .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }
        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        @media (max-width: 768px) {
            .admin-container {
                grid-template-columns: 1fr;
            }
            .admin-sidebar {
                position: static;
                width: 100%;
                height: auto;
            }
            .admin-main {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="admin-sidebar">
            <h2>🛒 NovaMart Admin</h2>
            <ul>
                <li><a href="#" data-tab="dashboard" class="admin-nav active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="#" data-tab="products" class="admin-nav"><i class="fas fa-box"></i> Products</a></li>
                <li><a href="#" data-tab="orders" class="admin-nav"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li><a href="#" data-tab="users" class="admin-nav"><i class="fas fa-users"></i> Users</a></li>
                <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="admin-main">
            <div class="admin-header">
                <h1>Admin Dashboard</h1>
                <div id="userInfo" style="text-align: right;"></div>
            </div>

            <!-- Dashboard Tab -->
            <div id="dashboard" class="admin-tab active">
                <div class="stats-grid" id="statsGrid"></div>
                <div class="admin-content">
                    <h3>Recent Orders</h3>
                    <table class="admin-table" id="recentOrdersTable">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrdersBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Products Tab -->
            <div id="products" class="admin-tab" style="display:none;">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn--primary" id="addProductBtn"><i class="fas fa-plus"></i> Add Product</button>
                </div>
                <div class="admin-content">
                    <table class="admin-table" id="productsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Orders Tab -->
            <div id="orders" class="admin-tab" style="display:none;">
                <div class="admin-content">
                    <table class="admin-table" id="ordersTable">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Payment</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ordersBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Users Tab -->
            <div id="users" class="admin-tab" style="display:none;">
                <div class="admin-content">
                    <table class="admin-table" id="usersTable">
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Name</th>
                                <th>Role</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal__overlay"></div>
        <div class="modal__content">
            <button class="modal__close" id="closeProductModal"><i class="fas fa-times"></i></button>
            <h2 id="productModalTitle">Add Product</h2>
            <form class="modal-form" id="productForm">
                <div class="form-row">
                    <div>
                        <label>Product Name</label>
                        <input type="text" id="productName" required>
                    </div>
                    <div>
                        <label>Category</label>
                        <select id="productCategory" required>
                            <option value="">Select Category</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Phone Accessories">Phone Accessories</option>
                            <option value="Fashion">Fashion</option>
                            <option value="Gaming">Gaming</option>
                            <option value="Home & Living">Home & Living</option>
                            <option value="Beauty">Beauty</option>
                            <option value="Sports">Sports</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label>Price</label>
                        <input type="number" id="productPrice" step="0.01" required>
                    </div>
                    <div>
                        <label>Original Price</label>
                        <input type="number" id="productOriginalPrice" step="0.01" required>
                    </div>
                </div>
                <div class="form-row">
                    <div>
                        <label>Stock</label>
                        <input type="number" id="productStock" required>
                    </div>
                    <div>
                        <label>Rating (0-5)</label>
                        <input type="number" id="productRating" step="0.1" min="0" max="5" value="4.5">
                    </div>
                </div>
                <div>
                    <label>Description</label>
                    <textarea id="productDescription" required></textarea>
                </div>
                <div>
                    <label>Image URL</label>
                    <input type="text" id="productImage" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn--outline" id="cancelProductBtn">Cancel</button>
                    <button type="submit" class="btn btn--primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-auth.js"></script>
    <script src="firebase-products.js"></script>
    <script src="firebase-orders.js"></script>
    <script src="admin.js"></script>
</body>
</html>

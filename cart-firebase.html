<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaMart Global — Shopping Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
    <style>
        .cart-page {
            padding: 40px 0 60px;
        }
        .cart-page h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cart-page .subtitle {
            color: var(--text-secondary);
            margin-bottom: 28px;
        }
        .cart-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 32px;
        }
        .cart-items {
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .cart-item {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 16px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }
        .cart-item:last-child { border-bottom: none; }
        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            background: var(--bg);
        }
        .cart-item__info h4 {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .cart-item__info .price {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.1rem;
        }
        .cart-item__qty {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cart-item__qty button {
            background: var(--bg);
            border: 1px solid var(--border);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
        }
        .cart-item__qty button:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .cart-item__qty span {
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }
        .cart-item__remove {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            padding: 4px 8px;
        }
        .cart-item__remove:hover {
            color: var(--danger);
        }
        .cart-summary {
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 24px 28px;
            align-self: start;
            position: sticky;
            top: 100px;
        }
        .cart-summary h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .cart-summary .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
        .cart-summary .row.total {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            border-top: 2px solid var(--border);
            padding-top: 16px;
            margin-top: 8px;
        }
        .cart-summary .btn {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            font-size: 1rem;
        }
        .cart-empty {
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .cart-empty i {
            font-size: 3rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .cart-empty h3 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }
        .cart-empty .btn {
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="container top-bar__inner">
            <span class="top-bar__tagline"><i class="fas fa-truck-fast"></i> Free shipping on orders over $50</span>
            <div class="top-bar__links">
                <a href="orders.html"><i class="fas fa-box"></i> My Orders</a>
                <a href="#"><i class="fas fa-circle-question"></i> Help</a>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="container header__inner">
            <a href="index-firebase.html" class="logo">
                <span class="logo__icon">🛒</span>
                <span class="logo__text">Nova<span class="logo__highlight">Mart</span></span>
                <span class="logo__badge">Global</span>
            </a>
            <div class="header-actions">
                <a href="wishlist-firebase.html" class="header-action" id="headerWishlist">
                    <i class="fas fa-heart"></i>
                    <span class="header-action__badge" id="wishlistCount">0</span>
                </a>
                <a href="cart-firebase.html" class="header-action" id="headerCart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="header-action__badge" id="cartCount">0</span>
                </a>
                <a href="login.html" class="header-action header-action--user">
                    <i class="fas fa-user-circle"></i>
                    <span class="header-action__label" id="userNameLabel">Sign In</span>
                </a>
            </div>
        </div>
    </header>

    <!-- CART PAGE -->
    <section class="cart-page">
        <div class="container">
            <h1><i class="fas fa-shopping-cart" style="color:var(--primary);"></i> Shopping Cart</h1>
            <p class="subtitle">Review your items and proceed to checkout.</p>
            <div id="cartContainer"></div>
        </div>
    </section>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-auth.js"></script>
    <script src="firebase-products.js"></script>
    <script src="firebase-cart.js"></script>
    <script src="firebase-wishlist.js"></script>
    <script src="cart-firebase.js"></script>
</body>
</html>
